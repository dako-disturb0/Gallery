name: Lint & Check

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Compile · Lint · Test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # Wajib: compileSdk 37 belum tentu preinstalled di image runner.
      - name: Ensure Android SDK Platform 37
        run: |
          sdkmanager --licenses || true
          sdkmanager "platforms;android-37" "build-tools;37.0.0" "platforms;android-36" || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile Kotlin
        run: ./gradlew compileDebugKotlin compileDebugUnitTestKotlin compileDebugAndroidTestKotlin

      - name: Run Lint
        run: ./gradlew lintDebug

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7
