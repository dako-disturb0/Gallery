name: Instrumented Tests

# Uji fungsi di runtime Android sungguhan (emulator), lintas beberapa API level.
# Ini menangkap masalah yang lolos dari lint/unit test — mis. crash native
# PdfRenderer, MediaStore, exec logcat. Berat & lambat, jadi dipisah dari CI cepat.

on:
  workflow_dispatch:
  push:
    branches: [ "dev" ]
    paths:
      - 'app/src/**'
      - 'gradle/**'
      - '**/*.gradle.kts'
      - '.github/workflows/instrumented.yml'

concurrency:
  group: androidtest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  instrumented:
    name: Emulator API ${{ matrix.api-level }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        api-level: [ 26, 30, 34 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Emulator x86_64 butuh akselerasi KVM (didukung runner ubuntu-latest).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      # Pemanasan: buat & simpan snapshot AVD sekali agar run berikutnya cepat boot.
      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Snapshot AVD dibuat."

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest

      - name: Upload instrumented report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-report-api${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
          retention-days: 7
